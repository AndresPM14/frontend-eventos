<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>🎓 EventosUC</h1>
      <p>Crear cuenta nueva</p>
    </div>
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre" [class.input-error]="errores.nombre" />
      <span class="field-error" *ngIf="errores.nombre">{{ errores.nombre }}</span>
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="correo" name="correo" placeholder="usuario@unicauca.edu.co" [class.input-error]="errores.correo" />
      <span class="field-error" *ngIf="errores.correo">{{ errores.correo }}</span>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" [class.input-error]="errores.password" />
      <span class="field-error" *ngIf="errores.password">{{ errores.password }}</span>
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" [(ngModel)]="confirmar" name="confirmar" placeholder="Repite tu contraseña" [class.input-error]="errores.confirmar" />
      <span class="field-error" *ngIf="errores.confirmar">{{ errores.confirmar }}</span>
    </div>
    <div class="error-msg" *ngIf="errores.general">{{ errores.general }}</div>
    <button (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Registrando...' : 'Crear cuenta' }}
    </button>
    <p class="link-login">¿Ya tienes cuenta? <a (click)="irLogin()">Inicia sesión</a></p>
  </div>
</div>
