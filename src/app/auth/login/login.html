<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>🎓 EventosUC</h1>
      <p>Plataforma de Eventos Académicos</p>
    </div>
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="correo" name="correo" placeholder="usuario@unicauca.edu.co" required />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>
    <p class="link-registro">¿No tienes cuenta? <a (click)="irRegistro()">Regístrate aquí</a></p>
  </div>
</div>
